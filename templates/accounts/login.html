{% extends 'base.html' %}
{% block title %}Sign In — IconJobs{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px">

  <div class="text-center mb-5">
    <div style="font-size:2.5rem;margin-bottom:0.5rem">👋</div>
    <h1 style="font-weight:800;font-size:2rem;letter-spacing:-0.03em">Welcome Back</h1>
    <p style="color:var(--slate-light);margin-top:0.4rem;font-size:0.95rem">Sign in to your IconJobs account.</p>
  </div>

  <div class="card" style="padding:2rem 2.25rem">
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="mb-4">
        <label class="form-label" for="id_username">Email or Username</label>
        <input
          type="text"
          name="username"
          id="id_username"
          class="form-control form-control-lg"
          placeholder="Enter your email or username"
          required
          autofocus
        >
      </div>

      <div class="mb-4">
        <label class="form-label" for="id_password">Password</label>
        <input
          type="password"
          name="password"
          id="id_password"
          class="form-control form-control-lg"
          placeholder="Enter your password"
          required
        >
      </div>

      <button type="submit" class="btn btn-amber btn-lg w-100">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <p class="text-center mt-4" style="font-size:0.875rem;color:var(--slate-light)">
      New to IconJobs? <a href="{% url 'register' %}" style="color:var(--amber-dark);font-weight:700">Create a free account</a>
    </p>
  </div>

</div>
{% endblock %}
